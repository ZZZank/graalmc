# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      publish:
        type: boolean
        default: false
        required: false
        description: Publish built mod file

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup Gradle wrapper
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.2.0

      - name: setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew buildAndCollect

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

      - name: publish
        if: ${{ inputs.publish }}
        run: ./gradlew publishMod
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSE_TOKEN: ${{ secrets.CURSE_TOKEN }}
          # GITHUB_TOKEN is generated automatically, so it will publish whenever 'publish.github' is defined